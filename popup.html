<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Link Cleaner</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 400px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #f9fafb;
    }
    
    h1 {
      font-size: 18px;
      margin-bottom: 8px;
      color: #111827;
    }
    
    .subtitle {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 20px;
    }
    
    .url-display {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 12px;
      word-break: break-all;
      font-size: 13px;
      color: #374151;
      max-height: 120px;
      overflow-y: auto;
    }
    
    .url-display.cleaned {
      background: #f0fdf4;
      border-color: #86efac;
    }
    
    .url-display.empty {
      color: #9ca3af;
      font-style: italic;
    }
    
    .label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #6b7280;
      margin-bottom: 6px;
    }
    
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 8px;
    }
    
    .btn-primary {
      background: #3b82f6;
      color: white;
    }
    
    .btn-primary:hover {
      background: #2563eb;
    }
    
    .btn-primary:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }
    
    .btn-secondary {
      background: white;
      color: #374151;
      border: 1px solid #e5e7eb;
    }
    
    .btn-secondary:hover {
      background: #f9fafb;
    }
    
    .success-msg {
      background: #10b981;
      color: white;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      text-align: center;
      margin-top: 12px;
      animation: fadeIn 0.3s;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .footer {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #e5e7eb;
      font-size: 11px;
      color: #9ca3af;
      text-align: center;
    }
    
    a {
      color: #3b82f6;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <h1>🔗 Link Cleaner</h1>
  <p class="subtitle">Remove tracking parameters with one click</p>
  
  <div class="label">Current URL</div>
  <div id="originalUrl" class="url-display empty">Navigate to a page to clean its URL</div>
  
  <div class="label">Cleaned URL</div>
  <div id="cleanedUrl" class="url-display empty">Click "Clean URL" to remove trackers</div>
  
  <button id="cleanBtn" class="btn-primary">Clean URL</button>
  <button id="copyBtn" class="btn-secondary" disabled>Copy Cleaned URL</button>
  
  <div id="successMsg" style="display: none;" class="success-msg">
    ✓ Copied to clipboard!
  </div>
  
  <div class="footer">
    Privacy-focused • No data collection<br>
    <a href="#" id="upgradeLink">Upgrade to Pro</a> for auto-clean
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
